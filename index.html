<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>联机德州扑克牌小游戏</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-shell">
    <section class="table" aria-label="德州扑克牌桌">
      <div class="topbar">
        <div>
          <p class="eyebrow">Online Texas Hold'em</p>
          <h1>联机德州扑克牌</h1>
        </div>
        <button id="homeBtn" class="home-button" type="button" hidden>返回首页</button>
        <button id="startHandBtn" class="icon-button" type="button" aria-label="开始新手牌">▶</button>
      </div>

      <div id="lobby" class="lobby">
        <div id="modeCard" class="lobby-card mode-card">
          <h2>选择玩法</h2>
          <p>先练手，或直接开房间和朋友打一局。</p>
          <div class="mode-actions">
            <button id="aiModeBtn" type="button">
              <strong>AI 练习</strong>
              <span>你对 3 个电脑玩家</span>
            </button>
            <button id="onlineModeBtn" type="button">
              <strong>好友联机</strong>
              <span>创建房间，复制链接邀请朋友</span>
            </button>
          </div>
        </div>

        <div class="lobby-card">
          <button id="backToModeBtn" class="text-button" type="button">返回玩法选择</button>
          <h2>和朋友开一桌</h2>
          <p>创建房间后，把房间号或网页链接发给朋友。选择 2 到 8 人上限，由房主开始发牌。</p>
          <label for="nameInput">昵称</label>
          <input id="nameInput" maxlength="12" placeholder="例如：小明">
          <input id="maxPlayersInput" type="hidden" value="4">
          <div class="player-count-field" role="group" aria-label="人数上限">
            <span>人数上限</span>
            <div class="player-count-options">
              <button class="player-count-option" type="button" data-count="2">2</button>
              <button class="player-count-option" type="button" data-count="3">3</button>
              <button class="player-count-option active" type="button" data-count="4">4</button>
              <button class="player-count-option" type="button" data-count="5">5</button>
              <button class="player-count-option" type="button" data-count="6">6</button>
              <button class="player-count-option" type="button" data-count="7">7</button>
              <button class="player-count-option" type="button" data-count="8">8</button>
            </div>
          </div>
          <div class="lobby-actions">
            <button id="createRoomBtn" type="button">创建房间</button>
            <input id="roomInput" maxlength="6" placeholder="房间号">
            <button id="joinRoomBtn" type="button">加入房间</button>
          </div>
        </div>
      </div>

      <div class="room-strip">
        <span>房间</span>
        <strong id="roomCode">未加入</strong>
        <button id="copyLinkBtn" type="button">复制链接</button>
      </div>

      <div class="opponents" id="opponents"></div>

      <div class="board-wrap">
        <div id="currentAction" class="current-action">等待入座</div>
        <div class="pot">
          <div id="potChips" class="chip-stack pot-stack" aria-hidden="true"></div>
          <div>
            <span>底池</span>
            <strong id="pot">0</strong>
          </div>
        </div>
        <div class="community" id="community" aria-label="公共牌"></div>
        <div class="phase" id="phase">等待入座</div>
      </div>

      <div class="player-zone">
        <div id="playerInfo" class="player-info"></div>
        <div class="hand" id="playerHand" aria-label="你的手牌"></div>
      </div>
    </section>

    <aside class="control-panel" aria-label="操作面板">
      <div class="status">
        <h2 id="statusTitle">准备联机</h2>
        <p id="statusText">创建或加入房间后即可开始。每个人只会看到自己的手牌。</p>
      </div>

      <div class="decision-card">
        <span>本轮需跟</span>
        <strong id="toCall">0</strong>
      </div>

      <div class="actions">
        <button id="foldBtn" type="button">弃牌</button>
        <button id="callBtn" type="button">跟注</button>
        <button id="raiseBtn" type="button">加注</button>
      </div>

      <div class="raise-box">
        <label for="raiseAmount">加注额</label>
        <input id="raiseAmount" type="range" min="20" max="200" step="10" value="40">
        <output id="raiseValue" for="raiseAmount">40</output>
      </div>

      <div class="log" id="log" aria-live="polite"></div>
    </aside>
  </main>

  <div class="rotate-hint" aria-hidden="true">
    <strong>请横屏游玩</strong>
    <span>旋转手机后，牌桌和按钮会完整显示。</span>
  </div>

  <script src="game.js"></script>
</body>
</html>
